[EMC]
MACHINE = CNC_Router
DEBUG = 0
VERSION = 1.1

[DISPLAY]
DISPLAY = gmoccapy
EDITOR = gedit
POSITION_OFFSET = RELATIVE
POSITION_FEEDBACK = ACTUAL
ARCDIVISION = 64
GRIDS = 10mm 20mm 50mm 100mm 1in 2in 5in 10in
MAX_FEED_OVERRIDE = 1.2
MIN_SPINDLE_OVERRIDE = 0.5
MAX_SPINDLE_OVERRIDE = 1.2
DEFAULT_LINEAR_VELOCITY = 4.00
MIN_LINEAR_VELOCITY = 0
MAX_LINEAR_VELOCITY = 30.00
CYCLE_TIME = 0.100
INTRO_GRAPHIC = linuxcnc.gif
INTRO_TIME = 5
PROGRAM_PREFIX = /home/cnc/Desktop/CNC
INCREMENTS = 5mm 1mm .5mm .1mm .05mm .01mm .005mm
PYVCP = custompanel.xml

EMBED_TAB_NAME = Functions
EMBED_TAB_LOCATION = ntb_user_tabs
EMBED_TAB_COMMAND = gladevcp -x {XID} button.glade

EMBED_TAB_NAME = Second user tab
EMBED_TAB_LOCATION = ntb_user_tabs
EMBED_TAB_COMMAND = gladevcp -x {XID} vcp_box.glade





[KINS]
JOINTS = 4
KINEMATICS = trivkins coordinates=XYYZ 

[FILTER]
PROGRAM_EXTENSION = .png,.gif,.jpg Greyscale Depth Image
PROGRAM_EXTENSION = .py Python Script
PROGRAM_EXTENSION = .nc,.tap G-Code File
png = image-to-gcode
gif = image-to-gcode
jpg = image-to-gcode
py = python

[TASK]
TASK = milltask
CYCLE_TIME = 0.010

[RS274NGC]
SUBROUTINE_PATH = macros
PARAMETER_FILE = linuxcnc.var



[EMCMOT]
EMCMOT = motmod
COMM_TIMEOUT = 1.0
BASE_PERIOD = 100000
SERVO_PERIOD = 1000000

[HAL]
HALUI = halui
HALFILE = CNC_Router.hal
HALFILE = custom.hal
POSTGUI_HALFILE = postgui_call_list.hal

[HALUI]
# add halui MDI commands here (max 64) 
# 00 – zero X
MDI_COMMAND = G10 L20 P0 X0

# 01 – zero Y
MDI_COMMAND = G10 L20 P0 Y0

# 02 – zero Z
MDI_COMMAND = G10 L20 P0 Z0

# 03 – zero ALL (X, Y, Z)
MDI_COMMAND = G10 L20 P0 X0 Y0 Z0

[TRAJ]
COORDINATES =  X Y Y Z
LINEAR_UNITS = mm
ANGULAR_UNITS = degree
DEFAULT_LINEAR_VELOCITY = 4.00
MAX_LINEAR_VELOCITY = 30.00

[EMCIO]
EMCIO = io
CYCLE_TIME = 0.100
TOOL_TABLE = tool.tbl

